plugins {
    id 'java'
    id 'net.neoforged.moddev' version '2.0.78'
}

version = '1.0.0'
group = 'com.fastplace'

base {
    archivesName = 'fastplace'
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
}

neoForge {
    version = '21.1.172'

    runs {
        client {
            client()
        }
        server {
            server()
        }
    }

    mods {
        fastplace {
            sourceSet(sourceSets.main)
        }
    }
}

dependencies {
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
