name: Build FastPlace Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: Java 21 をセットアップ
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle をセットアップ
        uses: gradle/actions/setup-gradle@v4

      - name: gradlew を生成
        run: gradle wrapper

      - name: 実行権限を付与
        run: chmod +x gradlew

      - name: Gradle でビルド
        run: ./gradlew build --no-daemon
        env:
          GRADLE_OPTS: "-Xmx2g"

      - name: MODファイルをダウンロード可能にする
        uses: actions/upload-artifact@v4
        with:
          name: FastPlace-Mod
          path: build/libs/fastplace-*.jar
          retention-days: 30
