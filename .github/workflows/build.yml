name: Build FastPlace Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: Java 21 をセットアップ
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 8.8 をセットアップ
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Gradle でビルド
        run: gradle build --no-daemon
        env:
          GRADLE_OPTS: "-Xmx2g"

      - name: MODファイルをダウンロード可能にする
        uses: actions/upload-artifact@v4
        with:
          name: FastPlace-Mod
          path: build/libs/fastplace-*.jar
          retention-days: 30
